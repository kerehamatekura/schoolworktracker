<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root{
    --primary:#5b5bf6;
    --primary-dark:#4341d6;
    --primary-light:#eeeeff;
    --text:#1e2333;
    --muted:#7b8299;
    --border:#e6e9f2;
    --bg:#f7f8fc;
    --red:#dc2626;
    --red-light:#fdecec;
    --green:#16a34a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;width:320px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--text);background:#fff;
  }
  header{
    background:linear-gradient(120deg,#5b5bf6,#7c5cf6,#a855f7);color:#fff;
    padding:14px 16px;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;
  }
  main{padding:16px;}
  label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);display:block;margin-bottom:5px;}
  select{
    width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;
    margin-bottom:12px;font-family:inherit;background:#fff;color:var(--text);
  }
  select:disabled{opacity:.5;}
  .timer-display{
    text-align:center;font-size:28px;font-weight:800;margin:6px 0 14px;font-variant-numeric:tabular-nums;
  }
  .timer-display.idle{color:var(--muted);font-size:15px;font-weight:600;}
  .timer-display.running{color:var(--red);}
  .now-playing{
    background:var(--primary-light);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12.5px;
  }
  .now-playing .np-name{font-weight:700;font-size:13.5px;color:var(--primary-dark);}
  button{
    width:100%;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;
    font-family:inherit;
  }
  .btn-start{background:var(--primary);color:#fff;}
  .btn-start:hover{background:var(--primary-dark);}
  .btn-start:disabled{background:#c7c8f5;cursor:not-allowed;}
  .btn-stop{background:var(--red-light);color:var(--red);}
  .btn-stop:hover{background:#fbdada;}
  .status{
    text-align:center;color:var(--muted);font-size:12.5px;padding:24px 10px;
  }
  .status button{margin-top:12px;background:var(--primary);color:#fff;}
  .footer-link{
    display:block;text-align:center;margin-top:12px;font-size:11.5px;color:var(--muted);text-decoration:none;
  }
  .footer-link:hover{color:var(--primary);}
</style>
</head>
<body>
  <header>📚 School Tracker Timer</header>
  <main id="app">
    <div class="status" id="loadingStatus">Loading…</div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
