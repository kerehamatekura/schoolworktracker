<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root{
    --primary:#5b5bf6;
    --primary-dark:#4341d6;
    --primary-light:#eeeeff;
    --accent:#ec4899;
    --text:#1e2333;
    --muted:#7b8299;
    --border:#e6e9f2;
    --bg:#f7f8fc;
    --red:#dc2626;
    --red-light:#fdecec;
    --green:#16a34a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;width:320px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--text);background:#fff;
  }
  header{
    background:linear-gradient(120deg,#5b5bf6,#7c5cf6,#a855f7);color:#fff;
    padding:14px 16px;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;
    box-shadow:0 2px 10px -2px rgba(91,91,246,.5);
  }
  main{padding:18px 16px;animation:popFadeIn .2s ease;}
  @keyframes popFadeIn{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}
  label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);display:block;margin-bottom:5px;}
  select{
    width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;
    margin-bottom:12px;font-family:inherit;background:#fff;color:var(--text);
    transition:border-color .15s ease;
  }
  select:focus{outline:none;border-color:var(--primary);}
  select:disabled{opacity:.5;}

  .timer-ring-wrap{position:relative;width:140px;height:140px;margin:8px auto 18px;}
  .timer-ring-wrap.running::after{
    content:'';position:absolute;inset:-6px;border-radius:50%;
    box-shadow:0 0 0 0 rgba(220,38,38,.28);animation:ringPulse 2s ease-out infinite;
  }
  @keyframes ringPulse{
    0%{box-shadow:0 0 0 0 rgba(220,38,38,.28);}
    70%{box-shadow:0 0 0 16px rgba(220,38,38,0);}
    100%{box-shadow:0 0 0 0 rgba(220,38,38,0);}
  }
  .timer-ring{width:100%;height:100%;transform:rotate(-90deg);display:block;}
  .ring-track{fill:none;stroke:var(--border);stroke-width:9;}
  .ring-fill{
    fill:none;stroke:var(--muted);stroke-width:9;stroke-linecap:round;
    stroke-dasharray:339.3;stroke-dashoffset:339.3;
    transition:stroke-dashoffset 1s linear, stroke .3s ease;
  }
  .ring-fill.running{stroke:url(#ringGradient);}
  .timer-ring-text{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:23px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.02em;
  }
  .timer-ring-text.idle{color:var(--muted);font-size:14px;font-weight:600;letter-spacing:0;}
  .timer-ring-text.running{color:var(--red);}

  .now-playing{
    background:var(--primary-light);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12.5px;
    border:1px solid #e0e0ff;
  }
  .now-playing .np-name{font-weight:700;font-size:13.5px;color:var(--primary-dark);}
  button{
    width:100%;padding:11px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:background .15s ease, transform .1s ease;
  }
  button:active{transform:translateY(1px);}
  .btn-start{background:var(--primary);color:#fff;box-shadow:0 4px 10px -3px rgba(91,91,246,.5);}
  .btn-start:hover:not(:disabled){background:var(--primary-dark);}
  .btn-start:disabled{background:#d8d9f8;color:#fff;cursor:not-allowed;box-shadow:none;}
  .btn-stop{background:var(--red-light);color:var(--red);}
  .btn-stop:hover{background:#fbdada;}
  .status{
    text-align:center;color:var(--muted);font-size:12.5px;padding:26px 10px;
  }
  .status button{margin-top:12px;background:var(--primary);color:#fff;}
  .footer-link{
    display:block;text-align:center;margin-top:12px;font-size:11.5px;color:var(--muted);text-decoration:none;
  }
  .footer-link:hover{color:var(--primary);}
  .today-stat{
    display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;
    border-top:1px solid var(--border);font-size:12px;color:var(--muted);
  }
  .today-stat strong{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
  <header>📚 School Tracker Timer</header>
  <main id="app">
    <div class="status" id="loadingStatus">Loading…</div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
