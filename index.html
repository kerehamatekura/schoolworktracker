<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%93%9A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lexend:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f8;
    --bg-grad-a:#eef2fb;
    --bg-grad-b:#f7eefb;
    --card:#ffffff;
    --border:#e6e9f2;
    --border-soft:#eef0f7;
    --text:#1e2333;
    --muted:#7b8299;
    --primary:#5b5bf6;
    --primary-light:#eeeeff;
    --primary-dark:#4341d6;
    --accent:#ec4899;
    --green:#16a34a;
    --green-light:#e9f9ef;
    --amber:#d97706;
    --amber-light:#fef6e7;
    --red:#dc2626;
    --red-light:#fdecec;
    --journal:#0ea5e9;
    --journal-light:#e6f6fd;
    --module:#8b5cf6;
    --module-light:#f2edfe;
    --dropbox:#f59e0b;
    --dropbox-light:#fef3e2;
    --quiz:#db2777;
    --quiz-light:#fdf1f8;
    --radius:16px;
    --radius-sm:10px;
    --shadow-sm:0 1px 2px rgba(30,35,51,.05), 0 1px 1px rgba(30,35,51,.03);
    --shadow-md:0 8px 24px -8px rgba(60,66,110,.16), 0 2px 6px rgba(60,66,110,.06);
    --shadow-lg:0 20px 40px -14px rgba(60,66,110,.28);
  }
  *{box-sizing:border-box;}
  ::selection{background:var(--primary);color:#fff;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:
      radial-gradient(1100px 500px at 8% -10%, var(--bg-grad-a), transparent),
      radial-gradient(900px 500px at 100% 0%, var(--bg-grad-b), transparent),
      var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Lexend','Inter',sans-serif;}

  header{
    background:linear-gradient(120deg,#5b5bf6 0%,#7c5cf6 55%,#a855f7 100%);
    color:#fff;
    padding:22px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:14px;
    box-shadow:0 4px 24px -6px rgba(91,91,246,.45);
    position:sticky;
    top:0;
    z-index:10;
  }
  header h1{
    margin:0;
    font-size:21px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:10px;
    letter-spacing:-.01em;
  }
  .header-title{display:flex;flex-direction:column;gap:2px;}
  .header-date{font-size:12.5px;color:rgba(255,255,255,.75);font-weight:500;margin-left:48px;}
  header h1 .logo{
    display:inline-flex;align-items:center;justify-content:center;
    width:38px;height:38px;border-radius:11px;
    background:rgba(255,255,255,.18);
    font-size:19px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);
  }
  .upload-badge{
    background:rgba(255,255,255,.16);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.25);
    border-radius:999px;
    padding:9px 18px 9px 14px;
    font-size:13.5px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:9px;
    box-shadow:var(--shadow-sm);
  }
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;box-shadow:0 0 0 3px rgba(255,255,255,.18);}
  .dot.green{background:#4ade80;}
  .dot.amber{background:#fbbf24;}
  .dot.red{background:#fb7185;}

  .layout{
    display:grid;
    grid-template-columns:250px 1fr;
    gap:22px;
    padding:24px;
    max-width:1200px;
    margin:0 auto;
    animation:appFadeIn .35s ease;
  }
  @keyframes appFadeIn{
    from{opacity:0;transform:translateY(6px);}
    to{opacity:1;transform:translateY(0);}
  }
  @media (max-width:800px){
    .layout{grid-template-columns:1fr;padding:16px;}
  }
  .panel{
    background:var(--card);
    border:1px solid var(--border-soft);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:var(--shadow-sm);
  }
  .sidebar{
    align-self:start;
    position:sticky;
    top:100px;
  }
  @media (max-width:800px){ .sidebar{position:static;} }
  .sidebar h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:2px 0 12px;font-weight:700;}
  .backup-section{margin-top:18px;padding-top:16px;border-top:1.5px solid var(--border-soft);}
  .backup-buttons{display:flex;flex-direction:column;gap:8px;}
  .backup-buttons .btn{width:100%;}
  .class-list{list-style:none;padding:0;margin:0 0 14px;}
  .class-list li{
    padding:11px 12px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    margin-bottom:3px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    font-weight:500;
    transition:background .15s ease, color .15s ease, transform .1s ease;
  }
  .class-list li:hover{background:var(--primary-light);}
  .class-list li:active{transform:scale(.98);}
  .class-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0;vertical-align:middle;}
  .class-list li.active{background:var(--primary);color:#fff;box-shadow:0 6px 14px -4px rgba(91,91,246,.55);}
  .class-list li.active .count{color:#fff;background:rgba(255,255,255,.22);}
  .class-list li.no-work{opacity:.75;}
  .class-list li .count{
    font-size:11.5px;font-weight:700;color:var(--muted);
    background:var(--bg);padding:2px 8px;border-radius:99px;
  }
  .class-list li .no-work-tag{
    font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    color:var(--amber);background:var(--amber-light);padding:3px 8px;border-radius:99px;
  }
  .class-list li.active .no-work-tag{background:rgba(255,255,255,.22);color:#fff;}
  .class-list li .del-btn{
    opacity:0;font-size:12px;background:none;border:none;color:inherit;cursor:pointer;
    padding:3px 6px;border-radius:6px;line-height:1;
  }
  .class-list li:hover .del-btn{opacity:0.55;}
  .class-list li .del-btn:hover{opacity:1 !important;background:rgba(0,0,0,.08);}
  .class-list li.active .del-btn:hover{background:rgba(255,255,255,.2);}
  .no-work-banner{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    background:var(--amber-light);border:1px solid #fbdfa2;color:#92400e;
    border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:18px;font-size:14px;font-weight:500;
  }
  .no-work-banner button{
    background:#fff;border:1px solid #f0c876;color:#92400e;border-radius:7px;
    padding:5px 12px;font-size:12px;font-weight:600;
  }
  .no-work-banner button:hover{background:#fffaf0;}

  input[type=text], select{
    width:100%;
    padding:9px 12px;
    border:1.5px solid var(--border);
    border-radius:var(--radius-sm);
    font-size:14px;
    margin-bottom:8px;
    font-family:inherit;
    color:var(--text);
    background:#fff;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input[type=text]:focus, select:focus{
    outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);
  }
  input[type=text]::placeholder{color:#a7adc0;}
  button{
    cursor:pointer;
    font-family:inherit;
  }
  .btn{
    background:var(--primary);
    color:#fff;
    border:none;
    padding:9px 16px;
    border-radius:var(--radius-sm);
    font-size:14px;
    font-weight:600;
    box-shadow:0 4px 10px -3px rgba(91,91,246,.55);
    transition:background .15s ease, transform .1s ease, box-shadow .15s ease;
  }
  .btn:hover{background:var(--primary-dark);box-shadow:0 6px 14px -3px rgba(91,91,246,.6);}
  .btn:active{transform:translateY(1px);}
  .btn.small{padding:6px 12px;font-size:12.5px;box-shadow:none;}
  .btn.secondary{background:#fff;color:var(--text);border:1.5px solid var(--border);box-shadow:none;}
  .btn.secondary:hover{background:var(--bg);border-color:#d7dbe8;}

  .main h2{margin-top:0;font-size:19px;font-weight:700;letter-spacing:-.01em;}
  .onboarding{
    background:linear-gradient(160deg,var(--primary-light),var(--quiz-light));
    border:1.5px dashed var(--primary);border-radius:var(--radius-sm);
    padding:30px 24px;text-align:center;margin-bottom:22px;
  }
  .onboarding .ob-icon{font-size:32px;margin-bottom:10px;}
  .onboarding h3{margin:0 0 6px;font-size:17px;font-family:'Lexend',sans-serif;}
  .onboarding p{margin:0 auto;max-width:420px;color:var(--muted);font-size:13.5px;line-height:1.5;}
  .main-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .main-header h2{margin:0;}
  .worked-btn{
    background:var(--green-light);color:var(--green);border:1.5px solid #cdeed9;
    padding:8px 16px;border-radius:99px;font-size:13px;font-weight:700;
    display:flex;align-items:center;gap:7px;box-shadow:none;transition:background .15s ease,border-color .15s ease,transform .1s ease;
  }
  .worked-btn:hover{background:#dcf3e3;border-color:#b7e6c6;}
  .worked-btn:active{transform:scale(.97);}
  .worked-btn.logged{background:var(--green);color:#fff;border-color:var(--green);}
  .worked-btn.logged:hover{background:#128a3e;}
  .dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:14px;
    margin-bottom:22px;
  }
  .stat{
    background:linear-gradient(160deg,#fbfbff,var(--bg));
    border:1px solid var(--border-soft);
    border-radius:var(--radius-sm);
    padding:16px;
    text-align:center;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
  .stat .num{font-size:26px;font-weight:800;font-family:'Lexend',sans-serif;letter-spacing:-.02em;}
  .stat .label{font-size:12px;color:var(--muted);margin-top:4px;font-weight:500;}
  .progress-bar{
    height:7px;
    background:var(--border);
    border-radius:99px;
    overflow:hidden;
    margin-top:10px;
  }
  .progress-bar > div{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;transition:width .3s ease;}

  .add-form{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:flex-end;
    margin-bottom:22px;
    padding:16px;
    background:var(--bg);
    border:1px solid var(--border-soft);
    border-radius:var(--radius-sm);
  }
  .add-form .field{flex:1;min-width:140px;}
  .add-form label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);display:block;margin-bottom:5px;}
  .type-checks{display:flex;gap:8px;flex-wrap:wrap;padding-bottom:8px;}
  .type-checks label{
    display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text);
    background:#fff;border:1.5px solid var(--border);padding:7px 12px;border-radius:99px;cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .type-checks label:has(input:checked){border-color:var(--primary);background:var(--primary-light);color:var(--primary-dark);}

  .assignment{
    border:1px solid var(--border-soft);
    border-radius:var(--radius-sm);
    padding:16px;
    margin-bottom:10px;
    display:flex;
    gap:14px;
    align-items:flex-start;
    background:#fff;
    transition:box-shadow .15s ease, transform .15s ease, border-color .15s ease;
  }
  .assignment:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:var(--border);}
  .assignment.done{opacity:0.65;background:var(--green-light);border-color:#dcf3e3;}
  .assignment.done:hover{transform:none;box-shadow:var(--shadow-sm);}
  .assignment input[type=checkbox]{
    width:21px;height:21px;margin-top:2px;flex-shrink:0;accent-color:var(--primary);cursor:pointer;
  }
  .assignment-body{flex:1;min-width:0;}
  .assignment-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;}
  .assignment-name{font-weight:600;font-size:15px;}
  .assignment-name.strike{text-decoration:line-through;color:var(--muted);}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .badge{
    font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    padding:4px 10px;border-radius:99px;
  }
  .badge.journal{background:var(--journal-light);color:#0369a1;}
  .badge.module{background:var(--module-light);color:#6d28d9;}
  .badge.dropbox{background:var(--dropbox-light);color:#b45309;}
  .badge.quiz{background:var(--quiz-light);color:var(--quiz);}
  .class-tag{font-size:12px;color:var(--muted);font-weight:500;}

  .meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:12.5px;}
  .outstanding-badge{
    color:var(--muted);font-weight:600;background:var(--bg);padding:4px 10px;border-radius:99px;white-space:nowrap;
  }
  .outstanding-badge.warn{color:var(--amber);background:var(--amber-light);}
  .outstanding-badge.overdue{color:var(--red);background:var(--red-light);}
  .due-field{display:flex;align-items:center;gap:6px;}
  .due-field input[type=date]{
    width:auto;padding:4px 8px;margin:0;border:1.5px solid var(--border);border-radius:7px;font-size:12px;
    font-family:inherit;color:var(--text);background:#fff;
  }
  .due-tag{padding:3px 9px;border-radius:99px;font-weight:700;font-size:11px;white-space:nowrap;}
  .due-tag.due-overdue{background:var(--red-light);color:var(--red);}
  .due-tag.due-today, .due-tag.due-soon{background:var(--amber-light);color:var(--amber);}
  .due-tag.due-normal{background:var(--green-light);color:var(--green);}

  .score-row{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:13px;}
  .score-row label{font-weight:600;color:var(--muted);white-space:nowrap;}
  .score-row input{
    padding:5px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12.5px;
    font-family:inherit;color:var(--text);background:#fff;width:180px;
  }
  .score-row input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}

  .module-step{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;font-weight:500;color:var(--muted);}
  .module-step input{
    width:76px;padding:5px 8px;margin:0;border:1.5px solid var(--border);border-radius:7px;font-size:13px;
    font-weight:700;color:var(--module);text-align:center;
  }
  .module-step input:focus{border-color:var(--module);box-shadow:0 0 0 3px var(--module-light);}
  .timer-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .timer-display{font-family:'Lexend',monospace;font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.02em;}
  .timer-row.running .timer-display{color:var(--red);}
  .btn.small.timer-start{background:var(--primary-light);color:var(--primary-dark);}
  .btn.small.timer-start:hover{background:#e2e2ff;}
  .btn.small.timer-stop{background:var(--red-light);color:var(--red);}
  .btn.small.timer-stop:hover{background:#fbdada;}
  .timer-row.running .timer-stop{animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.25);}50%{box-shadow:0 0 0 5px rgba(220,38,38,0);}}
  .assignment-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;}
  .upload-log{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6;}
  .upload-log a{opacity:.6;}
  .upload-log a:hover{opacity:1;}
  .empty{
    color:var(--muted);font-size:14px;padding:40px 20px;text-align:center;
    background:var(--bg);border-radius:var(--radius-sm);border:1.5px dashed var(--border);
  }
  .completed-hint{
    font-size:12.5px;color:var(--muted);margin-bottom:12px;font-weight:500;
  }
  .completed-hint a{color:var(--primary);font-weight:600;text-decoration:none;}
  .completed-hint a:hover{text-decoration:underline;}

  .month-nav{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .month-nav button{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;}
  .month-nav span{font-weight:600;}

  .view-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1.5px solid var(--border-soft);}
  .view-tabs button{
    background:none;border:none;padding:10px 16px;font-size:14px;font-weight:600;
    color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;
    border-radius:8px 8px 0 0;transition:color .15s ease, background .15s ease;
  }
  .view-tabs button:hover{color:var(--text);background:var(--bg);}
  .view-tabs button.active{color:var(--primary);border-bottom-color:var(--primary);background:none;}

  .history-item{
    border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
    background:#fff;transition:box-shadow .15s ease;
  }
  .history-item:hover{box-shadow:var(--shadow-sm);}
  .history-item .hist-name{font-weight:600;font-size:14px;}
  .history-item .hist-date{
    font-size:12.5px;font-weight:700;color:var(--green);white-space:nowrap;
    background:var(--green-light);padding:5px 12px;border-radius:99px;
  }

  .report-overlay{display:none;position:fixed;inset:0;background:#fff;z-index:200;overflow:auto;}
  .report-overlay.open{display:block;}
  .report-toolbar{
    position:sticky;top:0;background:#fff;border-bottom:1.5px solid var(--border-soft);
    padding:14px 24px;display:flex;justify-content:flex-end;gap:10px;z-index:2;
  }
  .report-body{max-width:820px;margin:0 auto;padding:36px;color:var(--text);}
  .report-header-bar{height:7px;border-radius:99px;margin-bottom:22px;background:linear-gradient(120deg,#5b5bf6 0%,#7c5cf6 55%,#a855f7 100%);}
  .report-body h1{font-size:27px;margin:0 0 4px;font-family:'Lexend',sans-serif;letter-spacing:-.01em;}
  .report-body .report-sub{color:var(--muted);font-size:14px;margin-bottom:28px;}
  .report-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:32px;}
  .report-summary .stat{background:var(--bg);}
  .report-section{margin-bottom:30px;page-break-inside:avoid;}
  .report-section h2{
    font-size:16px;margin:0 0 14px;padding-bottom:9px;font-family:'Lexend',sans-serif;
    border-bottom:2.5px solid var(--primary);color:var(--text);
  }
  .report-section h3{
    font-size:12px;margin:18px 0 8px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;
  }
  .report-section h3:first-of-type{margin-top:4px;}
  .report-table{width:100%;border-collapse:collapse;font-size:13px;}
  .report-table th, .report-table td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border-soft);}
  .report-table tbody tr:nth-child(even){background:var(--bg);}
  .report-table th{color:var(--muted);font-weight:700;text-transform:uppercase;font-size:10.5px;letter-spacing:.04em;}
  .report-empty{color:var(--muted);font-size:13px;font-style:italic;padding:6px 0;}

  .subject-bars{display:flex;flex-direction:column;gap:11px;}
  .subject-bar-row{display:flex;align-items:center;gap:12px;}
  .subject-bar-label{width:150px;font-size:13px;font-weight:600;flex-shrink:0;}
  .subject-bar-track{flex:1;background:var(--bg);border-radius:99px;height:14px;overflow:hidden;}
  .subject-bar-fill{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;}
  .subject-bar-time{width:80px;text-align:right;font-size:12.5px;font-weight:700;color:var(--muted);flex-shrink:0;}

  .pending-list{list-style:none;padding:0;margin:0;}
  .pending-list li{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:8px 0;border-bottom:1px dashed var(--border-soft);font-size:13px;
  }
  .pending-list li:last-child{border-bottom:none;}
  .pending-due{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap;}
  .pending-due.overdue{background:var(--red-light);color:var(--red);}
  .pending-due.soon{background:var(--amber-light);color:var(--amber);}
  .pending-due.normal{background:var(--bg);color:var(--muted);}
  .pending-step{
    font-size:10.5px;font-weight:700;background:var(--module-light);color:var(--module);
    padding:2px 8px;border-radius:99px;margin-left:6px;white-space:nowrap;
  }

  .highlights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
  .highlight-card{background:var(--bg);border-radius:10px;padding:16px;text-align:center;}
  .highlight-card .hl-icon{font-size:20px;margin-bottom:6px;}
  .highlight-card .hl-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:5px;}
  .highlight-card .hl-value{font-size:14px;font-weight:700;line-height:1.3;}
  .highlight-card .hl-sub{font-size:12px;color:var(--muted);margin-top:3px;}

  @media print{
    body > *:not(.report-overlay){display:none !important;}
    .report-overlay{position:static !important;}
    .no-print{display:none !important;}
    .report-body{padding:0;max-width:none;}
    .report-summary .stat, .report-table tbody tr:nth-child(even){background:#f4f4f8 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .subject-bar-fill, .report-header-bar{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1><span class="logo">📚</span> School Tracker</h1>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="upload-badge" id="uploadBadge">
    <span class="dot" id="uploadDot"></span>
    <span id="uploadText">Loading...</span>
  </div>
</header>

<div class="layout">
  <div class="panel sidebar">
    <h2>Classes</h2>
    <ul class="class-list" id="classList"></ul>
    <input type="text" id="newClassName" placeholder="New class name">
    <button class="btn" style="width:100%" onclick="addClass()">+ Add class</button>

    <div class="backup-section">
      <h2>Report</h2>
      <div class="backup-buttons">
        <button class="btn secondary" onclick="openReport('today')">📄 Today</button>
        <button class="btn secondary" onclick="openReport('week')">📄 This week (Mon–Fri)</button>
        <button class="btn secondary" onclick="openReport('month')">📄 Last 30 days</button>
      </div>
    </div>

    <div class="backup-section">
      <h2>Backup</h2>
      <div class="backup-buttons">
        <button class="btn secondary" onclick="exportData()">⬇ Export data</button>
        <button class="btn secondary" onclick="document.getElementById('importFile').click()">⬆ Import data</button>
      </div>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importData(this.files[0])">
    </div>
  </div>

  <div class="panel main">
    <div id="onboarding"></div>
    <div class="dashboard" id="dashboard"></div>

    <div class="main-header">
      <h2 id="mainTitle">All classes</h2>
      <div id="workedTodayWrap"></div>
    </div>

    <div id="noWorkBanner"></div>

    <div class="view-tabs">
      <button id="tabBoard" class="active" onclick="setView('board')">Assignments</button>
      <button id="tabHistory" onclick="setView('history')">History</button>
    </div>

    <div id="boardView">
      <div class="add-form">
        <div class="field" style="min-width:180px;">
          <label>Assignment name</label>
          <input type="text" id="newAssignName" placeholder="e.g. Chapter 3 Reflection">
        </div>
        <div class="field" style="min-width:160px;">
          <label>Class</label>
          <select id="newAssignClass"></select>
        </div>
        <div class="field" style="min-width:150px;">
          <label>Due date (optional)</label>
          <input type="date" id="newAssignDue">
        </div>
        <div class="field" style="flex-basis:100%;">
          <label>Type (pick one or more)</label>
          <div class="type-checks">
            <label><input type="checkbox" value="journal" class="typeCheck"> Journal</label>
            <label><input type="checkbox" value="module" class="typeCheck"> Module</label>
            <label><input type="checkbox" value="dropbox" class="typeCheck"> Dropbox</label>
            <label><input type="checkbox" value="quiz" class="typeCheck"> Quiz</label>
          </div>
        </div>
        <div class="field" style="min-width:100px;flex:0 0 auto;">
          <button class="btn" onclick="addAssignment()">+ Add assignment</button>
        </div>
      </div>

      <div id="assignmentList"></div>
    </div>

    <div id="historyView" style="display:none;"></div>
  </div>
</div>

<datalist id="scoreOptions">
  <option value="Excellent">
  <option value="Very Good">
  <option value="Good">
  <option value="Satisfactory">
  <option value="Needs Improvement">
  <option value="100%">
</datalist>

<div class="report-overlay" id="reportOverlay">
  <div class="report-toolbar no-print">
    <button class="btn secondary" onclick="closeReport()">✕ Close</button>
    <button class="btn" onclick="window.print()">🖨 Download / Print PDF</button>
  </div>
  <div class="report-body" id="reportBody"></div>
</div>

<script>
const STORAGE_KEY = 'school-tracker-data-v1';

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { classes: [], assignments: [] };
}
function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function exportData(){
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `school-tracker-backup-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let parsed;
    try{
      parsed = JSON.parse(reader.result);
    }catch(e){
      alert('That file is not valid JSON.');
      return;
    }
    if(!parsed || !Array.isArray(parsed.classes) || !Array.isArray(parsed.assignments)){
      alert('That file doesn\'t look like a School Tracker backup.');
      return;
    }
    if(!confirm('This will replace all current data with the imported file. Continue?')) return;
    data = migrateData(parsed);
    selectedClassId = null;
    saveData();
    render();
    document.getElementById('importFile').value = '';
  };
  reader.readAsText(file);
}

function migrateData(d){
  if(!d.classes) d.classes = [];
  if(!d.assignments) d.assignments = [];
  d.classes.forEach(c=>{
    if(c.noWorkAssigned===undefined) c.noWorkAssigned = false;
    if(!c.workLog) c.workLog = [];
  });
  d.assignments.forEach(a=>{
    if(a.dueDate===undefined) a.dueDate = null;
    if(!a.createdDate) a.createdDate = a.completedDate || todayISO();
    if(a.score===undefined) a.score = '';
    if(!a.timeSessions){
      a.timeSessions = (a.totalSeconds && a.totalSeconds > 0)
        ? [{ date: a.completedDate || a.createdDate, seconds: a.totalSeconds }]
        : [];
    }
    delete a.totalSeconds;
    if(a.timerStart===undefined) a.timerStart = null;
    if(!a.uploads) a.uploads = [];
  });
  return d;
}

let data = migrateData(loadData());
let selectedClassId = null; // null = all classes
let currentView = 'board'; // 'board' | 'history'

function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

const CLASS_COLOR_PALETTE = ['#5b5bf6','#ec4899','#0ea5e9','#f59e0b','#16a34a','#8b5cf6','#14b8a6','#ef4444'];
function classColor(classId){
  // Index-based (not a hash of the id) so classes created moments apart
  // — whose timestamp-based ids are nearly identical — never collide.
  const idx = data.classes.findIndex(c => c.id === classId);
  return CLASS_COLOR_PALETTE[(idx < 0 ? 0 : idx) % CLASS_COLOR_PALETTE.length];
}

function toISODate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function todayISO(){
  return toISODate(new Date());
}

function daysBetween(isoA, isoB){
  const a = new Date(isoA+'T00:00:00');
  const b = new Date(isoB+'T00:00:00');
  return Math.round((b-a)/86400000);
}

function formatDateNice(d){
  return d.toLocaleDateString('en-NZ', { day:'numeric', month:'short', year:'numeric' });
}

// ---------- Classes ----------
function addClass(){
  const input = document.getElementById('newClassName');
  const name = input.value.trim();
  if(!name) return;
  data.classes.push({ id: uid(), name, noWorkAssigned: false, workLog: [] });
  input.value = '';
  saveData();
  render();
}

function toggleNoWork(id, evt){
  if(evt) evt.stopPropagation();
  const cls = data.classes.find(c=>c.id===id);
  cls.noWorkAssigned = !cls.noWorkAssigned;
  saveData();
  render();
}

function toggleWorkedToday(classId){
  const cls = data.classes.find(c=>c.id===classId);
  if(!cls.workLog) cls.workLog = [];
  const today = todayISO();
  const idx = cls.workLog.indexOf(today);
  if(idx === -1) cls.workLog.push(today);
  else cls.workLog.splice(idx, 1);
  saveData();
  render();
}

function deleteClass(id, evt){
  evt.stopPropagation();
  const cls = data.classes.find(c=>c.id===id);
  if(!confirm(`Delete "${cls.name}" and all its assignments?`)) return;
  data.classes = data.classes.filter(c=>c.id!==id);
  data.assignments = data.assignments.filter(a=>a.classId!==id);
  if(selectedClassId===id) selectedClassId = null;
  saveData();
  render();
}

function selectClass(id){
  selectedClassId = id;
  render();
}

// ---------- Assignments ----------
function addAssignment(){
  const nameInput = document.getElementById('newAssignName');
  const classSelect = document.getElementById('newAssignClass');
  const dueInput = document.getElementById('newAssignDue');
  const name = nameInput.value.trim();
  const classId = classSelect.value;
  const types = Array.from(document.querySelectorAll('.typeCheck:checked')).map(c=>c.value);

  if(!name){ alert('Give the assignment a name.'); return; }
  if(!classId){ alert('Add a class first.'); return; }
  if(types.length===0){ alert('Pick at least one type.'); return; }

  data.assignments.push({
    id: uid(),
    classId,
    name,
    types,
    moduleStep: types.includes('module') ? '1.1' : '',
    done: false,
    completedDate: null,
    createdDate: todayISO(),
    dueDate: dueInput.value || null,
    score: '',
    uploads: [],
    timeSessions: [],
    timerStart: null
  });

  nameInput.value = '';
  dueInput.value = '';
  document.querySelectorAll('.typeCheck').forEach(c=>c.checked=false);
  saveData();
  render();
}

function updateDueDate(id, value){
  const a = data.assignments.find(x=>x.id===id);
  a.dueDate = value || null;
  saveData();
  render();
}

function updateScore(id, value){
  const a = data.assignments.find(x=>x.id===id);
  a.score = value;
  saveData();
}

function deleteAssignment(id){
  if(!confirm('Delete this assignment?')) return;
  data.assignments = data.assignments.filter(a=>a.id!==id);
  saveData();
  render();
}

function toggleDone(id){
  const a = data.assignments.find(x=>x.id===id);
  a.done = !a.done;
  a.completedDate = a.done ? todayISO() : null;
  if(a.done && a.timerStart){
    addSessionSeconds(a, (Date.now()-a.timerStart)/1000);
    a.timerStart = null;
  }
  saveData();
  render();
}

function setView(view){
  currentView = view;
  render();
}

// ---------- Timers ----------
let tickInterval = null;

function addSessionSeconds(a, seconds){
  if(seconds <= 0) return;
  // Each start/stop is kept as its own session (not merged into the day's total)
  // so reports can show session counts and average session length.
  a.timeSessions.push({ date: todayISO(), seconds });
}

// from/to are ISO dates (inclusive); omit both for all-time total
function getAssignmentSeconds(a, from, to){
  let s = 0;
  (a.timeSessions||[]).forEach(sess=>{
    if((!from || sess.date>=from) && (!to || sess.date<=to)) s += sess.seconds;
  });
  if(a.timerStart){
    const today = todayISO();
    if((!from || today>=from) && (!to || today<=to)){
      s += (Date.now() - a.timerStart) / 1000;
    }
  }
  return s;
}

function formatDuration(totalSeconds){
  totalSeconds = Math.max(0, Math.round(totalSeconds));
  const h = Math.floor(totalSeconds/3600);
  const m = Math.floor((totalSeconds%3600)/60);
  const s = totalSeconds%60;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m ${s}s`;
  return `${s}s`;
}

function startTimer(id){
  // only one timer can run at a time
  data.assignments.forEach(a=>{
    if(a.timerStart){
      addSessionSeconds(a, (Date.now()-a.timerStart)/1000);
      a.timerStart = null;
    }
  });
  const target = data.assignments.find(a=>a.id===id);
  target.timerStart = Date.now();
  saveData();
  render();
}

function stopTimer(id){
  const a = data.assignments.find(x=>x.id===id);
  if(a.timerStart){
    addSessionSeconds(a, (Date.now()-a.timerStart)/1000);
    a.timerStart = null;
  }
  saveData();
  render();
}

function ensureTicking(){
  const running = data.assignments.some(a=>a.timerStart);
  if(running && !tickInterval){
    tickInterval = setInterval(tickUpdate, 1000);
  } else if(!running && tickInterval){
    clearInterval(tickInterval);
    tickInterval = null;
  }
}

function tickUpdate(){
  data.assignments.forEach(a=>{
    if(!a.timerStart) return;
    const el = document.getElementById(`timer-disp-${a.id}`);
    if(el) el.textContent = formatDuration(getAssignmentSeconds(a));
  });
  const statEl = document.getElementById('statTime');
  if(statEl){
    const relevant = selectedClassId
      ? data.assignments.filter(a=>a.classId===selectedClassId)
      : data.assignments;
    const total = relevant.reduce((sum,a)=>sum+getAssignmentSeconds(a), 0);
    statEl.textContent = formatDuration(total);
  }
}

function updateModuleStep(id, value){
  const a = data.assignments.find(x=>x.id===id);
  a.moduleStep = value;
  saveData();
}

function logUpload(id){
  const a = data.assignments.find(x=>x.id===id);
  a.uploads.push(todayISO());
  saveData();
  render();
}

function removeUpload(id, idx){
  const a = data.assignments.find(x=>x.id===id);
  a.uploads.splice(idx,1);
  saveData();
  render();
}

// ---------- Stats ----------
function uploadsInMonth(year, month){
  let count = 0;
  data.assignments.forEach(a=>{
    a.uploads.forEach(dateStr=>{
      const d = new Date(dateStr);
      if(d.getFullYear()===year && d.getMonth()===month) count++;
    });
  });
  return count;
}

function updateUploadBadge(){
  const now = new Date();
  const count = uploadsInMonth(now.getFullYear(), now.getMonth());
  const goal = 5;
  const dot = document.getElementById('uploadDot');
  const text = document.getElementById('uploadText');

  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const daysLeft = daysInMonth - now.getDate();
  const remaining = Math.max(0, goal - count);

  let cls = 'green';
  if(count >= goal) cls = 'green';
  else if(remaining <= daysLeft) cls = 'amber';
  else cls = 'red';

  dot.className = 'dot ' + cls;
  text.textContent = `${count}/${goal} dropbox uploads this month`;
}

// ---------- Rendering ----------
function render(){
  renderHeaderDate();
  renderOnboarding();
  renderClassList();
  renderClassSelect();
  renderDashboard();
  renderNoWorkBanner();
  renderWorkedToday();
  renderViewTabs();
  renderAssignments();
  renderHistory();
  updateUploadBadge();
  ensureTicking();
}

function renderHeaderDate(){
  const el = document.getElementById('headerDate');
  if(el) el.textContent = new Date().toLocaleDateString('en-NZ', { weekday: 'long', day: 'numeric', month: 'long' });
}

function renderOnboarding(){
  const el = document.getElementById('onboarding');
  if(data.classes.length > 0){ el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="onboarding">
      <div class="ob-icon">👋</div>
      <h3>Welcome to School Tracker</h3>
      <p>Add your first class over in the sidebar to get started — then add assignments, track modules, log dropbox uploads, and time your work.</p>
    </div>
  `;
}

function renderWorkedToday(){
  const wrap = document.getElementById('workedTodayWrap');
  if(!selectedClassId){ wrap.innerHTML=''; return; }
  const cls = data.classes.find(c=>c.id===selectedClassId);
  if(!cls){ wrap.innerHTML=''; return; }
  const logged = (cls.workLog||[]).includes(todayISO());
  wrap.innerHTML = `
    <button class="worked-btn ${logged?'logged':''}" onclick="toggleWorkedToday('${cls.id}')">
      ${logged ? '✔ Worked on this today' : '📝 I\'ve worked on this today'}
    </button>
  `;
}

function renderViewTabs(){
  document.getElementById('tabBoard').classList.toggle('active', currentView==='board');
  document.getElementById('tabHistory').classList.toggle('active', currentView==='history');
  document.getElementById('boardView').style.display = currentView==='board' ? '' : 'none';
  document.getElementById('historyView').style.display = currentView==='history' ? '' : 'none';
}

function renderNoWorkBanner(){
  const el = document.getElementById('noWorkBanner');
  if(!selectedClassId){ el.innerHTML=''; return; }
  const cls = data.classes.find(c=>c.id===selectedClassId);
  if(!cls || !cls.noWorkAssigned){ el.innerHTML=''; return; }
  el.innerHTML = `
    <div class="no-work-banner">
      <span>📭 No work currently assigned for ${escapeHtml(cls.name)}.</span>
      <button onclick="toggleNoWork('${cls.id}')">Clear status</button>
    </div>
  `;
}

function renderClassList(){
  const list = document.getElementById('classList');
  list.innerHTML = '';

  const allLi = document.createElement('li');
  allLi.className = selectedClassId===null ? 'active' : '';
  allLi.onclick = ()=>selectClass(null);
  const allTodo = data.assignments.filter(a=>!a.done).length;
  allLi.innerHTML = `<span>All classes</span><span class="count" title="assignments still to do">${allTodo}</span>`;
  list.appendChild(allLi);

  data.classes.forEach(c=>{
    const count = data.assignments.filter(a=>a.classId===c.id && !a.done).length;
    const li = document.createElement('li');
    li.className = (selectedClassId===c.id ? 'active ' : '') + (c.noWorkAssigned ? 'no-work' : '');
    li.onclick = ()=>selectClass(c.id);
    const rightSide = c.noWorkAssigned
      ? `<span class="no-work-tag">no work</span>`
      : `<span class="count" title="assignments still to do">${count}</span>`;
    li.innerHTML = `<span><span class="class-dot" style="background:${classColor(c.id)}"></span>${escapeHtml(c.name)}</span><span style="display:flex;align-items:center;gap:6px;">${rightSide}<button class="del-btn no-work-btn" title="Toggle: no work assigned">📭</button><button class="del-btn" title="Delete class">✕</button></span>`;
    li.querySelector('.no-work-btn').onclick = (e)=>toggleNoWork(c.id, e);
    li.querySelector('.del-btn:last-child').onclick = (e)=>deleteClass(c.id, e);
    list.appendChild(li);
  });
}

function renderClassSelect(){
  const sel = document.getElementById('newAssignClass');
  const current = sel.value;
  sel.innerHTML = '<option value="">Select class...</option>' +
    data.classes.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
  if(selectedClassId) sel.value = selectedClassId;
  else if(current) sel.value = current;
}

function renderDashboard(){
  const dash = document.getElementById('dashboard');
  const title = document.getElementById('mainTitle');

  const relevant = selectedClassId
    ? data.assignments.filter(a=>a.classId===selectedClassId)
    : data.assignments;

  title.textContent = selectedClassId
    ? (data.classes.find(c=>c.id===selectedClassId)?.name || 'Class')
    : 'All classes';

  const total = relevant.length;
  const done = relevant.filter(a=>a.done).length;
  const pct = total ? Math.round(done/total*100) : 0;

  const now = new Date();
  const monthCount = uploadsInMonth(now.getFullYear(), now.getMonth());
  const monthName = now.toLocaleString('default',{month:'long'});
  const timeTotal = relevant.reduce((sum,a)=>sum+getAssignmentSeconds(a), 0);

  dash.innerHTML = `
    <div class="stat">
      <div class="num">${done}/${total}</div>
      <div class="label">Assignments completed</div>
      <div class="progress-bar"><div style="width:${pct}%"></div></div>
    </div>
    <div class="stat">
      <div class="num">${total-done}</div>
      <div class="label">Still to do</div>
    </div>
    <div class="stat">
      <div class="num" style="color:${monthCount>=5?'var(--green)':'var(--red)'}">${monthCount}/5</div>
      <div class="label">Dropbox uploads in ${monthName}</div>
    </div>
    <div class="stat">
      <div class="num" id="statTime">${formatDuration(timeTotal)}</div>
      <div class="label">Time spent${selectedClassId?'':' (all classes)'}</div>
    </div>
  `;
}

function renderAssignments(){
  const container = document.getElementById('assignmentList');
  const scoped = selectedClassId
    ? data.assignments.filter(a=>a.classId===selectedClassId)
    : data.assignments;
  const doneCount = scoped.filter(a=>a.done).length;
  const list = scoped.filter(a=>!a.done).slice().sort((a,b)=>{
    if(a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate) || a.name.localeCompare(b.name);
    if(a.dueDate) return -1;
    if(b.dueDate) return 1;
    return a.name.localeCompare(b.name);
  });

  const hint = doneCount > 0
    ? `<div class="completed-hint">✅ ${doneCount} completed — <a href="#" onclick="event.preventDefault();setView('history')">view in History</a></div>`
    : '';

  if(list.length===0){
    container.innerHTML = hint + `<div class="empty">Nothing left to do${doneCount>0?' — great work!':'. Add an assignment above.'}</div>`;
    return;
  }

  container.innerHTML = hint + list.map(a=>{
    const cls = data.classes.find(c=>c.id===a.classId);
    const badges = a.types.map(t=>`<span class="badge ${t}">${t}</span>`).join('');
    const moduleStep = a.types.includes('module') ? `
      <div class="module-step">
        📘 On step:
        <input type="text" value="${escapeHtml(a.moduleStep||'')}" onchange="updateModuleStep('${a.id}', this.value)">
      </div>` : '';

    const uploadList = a.uploads.length ? `
      <div class="upload-log">Uploaded: ${a.uploads.map((d,i)=>`${d} <a href="#" onclick="event.preventDefault();removeUpload('${a.id}',${i})" style="color:var(--red);text-decoration:none;">✕</a>`).join(', ')}</div>
    ` : '';

    const running = !!a.timerStart;
    const timerRow = `
      <div class="timer-row ${running?'running':''}">
        <button class="btn small ${running?'timer-stop':'timer-start'}" onclick="${running?`stopTimer('${a.id}')`:`startTimer('${a.id}')`}">
          ${running?'⏸ Stop':'▶ Start'} timer
        </button>
        <span class="timer-display" id="timer-disp-${a.id}">${formatDuration(getAssignmentSeconds(a))}</span>
      </div>`;

    const outstandingDays = daysBetween(a.createdDate || todayISO(), todayISO());
    const outstandingLabel = outstandingDays<=0 ? 'Added today' : outstandingDays===1 ? 'Open 1 day' : `Open ${outstandingDays} days`;
    const outstandingClass = outstandingDays>=14 ? 'overdue' : outstandingDays>=7 ? 'warn' : '';

    let dueTagHtml = '';
    if(a.dueDate){
      const diff = daysBetween(todayISO(), a.dueDate);
      let dueClass='due-normal', dueLabel;
      if(diff<0){ dueClass='due-overdue'; dueLabel=`Overdue ${Math.abs(diff)}d`; }
      else if(diff===0){ dueClass='due-today'; dueLabel='Due today'; }
      else if(diff<=3){ dueClass='due-soon'; dueLabel=diff===1?'Due tomorrow':`Due in ${diff}d`; }
      else { dueLabel=`Due in ${diff}d`; }
      dueTagHtml = `<span class="due-tag ${dueClass}">${dueLabel}</span>`;
    }

    const metaRow = `
      <div class="meta-row">
        <span class="outstanding-badge ${outstandingClass}">🕒 ${outstandingLabel}</span>
        <span class="due-field">
          📅 <input type="date" value="${a.dueDate||''}" onchange="updateDueDate('${a.id}', this.value)" title="Due date">
          ${dueTagHtml}
        </span>
      </div>`;

    const classAccent = selectedClassId===null ? ` style="border-left:4px solid ${classColor(a.classId)}"` : '';

    return `
      <div class="assignment ${a.done?'done':''}"${classAccent}>
        <input type="checkbox" ${a.done?'checked':''} onchange="toggleDone('${a.id}')">
        <div class="assignment-body">
          <div class="assignment-top">
            <div>
              <span class="assignment-name ${a.done?'strike':''}">${escapeHtml(a.name)}</span>
              ${selectedClassId===null ? `<span class="class-tag"> · ${escapeHtml(cls?.name||'')}</span>` : ''}
            </div>
          </div>
          <div class="badges">${badges}</div>
          ${metaRow}
          ${moduleStep}
          ${timerRow}
          <div class="assignment-actions">
            <button class="btn small" onclick="logUpload('${a.id}')">⬆ Log dropbox upload</button>
            <button class="btn small secondary" onclick="deleteAssignment('${a.id}')">Delete</button>
          </div>
          ${uploadList}
        </div>
      </div>
    `;
  }).join('');
}

function renderHistory(){
  const container = document.getElementById('historyView');
  if(currentView !== 'history') return;

  const list = (selectedClassId
    ? data.assignments.filter(a=>a.classId===selectedClassId)
    : data.assignments
  ).filter(a=>a.done && a.completedDate)
   .slice()
   .sort((a,b)=> b.completedDate.localeCompare(a.completedDate));

  if(list.length===0){
    container.innerHTML = '<div class="empty">Nothing completed yet.</div>';
    return;
  }

  container.innerHTML = list.map(a=>{
    const cls = data.classes.find(c=>c.id===a.classId);
    const badges = a.types.map(t=>`<span class="badge ${t}">${t}</span>`).join('');
    const classAccent = selectedClassId===null ? ` style="border-left:4px solid ${classColor(a.classId)}"` : '';
    return `
      <div class="history-item"${classAccent}>
        <div>
          <span class="hist-name">${escapeHtml(a.name)}</span>
          ${selectedClassId===null ? `<span class="class-tag"> · ${escapeHtml(cls?.name||'')}</span>` : ''}
          <div class="badges">${badges}</div>
          <div class="score-row">
            <label>Score:</label>
            <input list="scoreOptions" value="${escapeHtml(a.score||'')}" placeholder="e.g. 85% or Very Good" onchange="updateScore('${a.id}', this.value)">
          </div>
        </div>
        <span style="display:flex;align-items:center;gap:8px;">
          ${getAssignmentSeconds(a) > 0 ? `<span class="class-tag">⏱ ${formatDuration(getAssignmentSeconds(a))}</span>` : ''}
          <span class="hist-date">✅ ${a.completedDate}</span>
        </span>
      </div>
    `;
  }).join('');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

// ---------- Reports ----------
function getWeekRange(){
  const now = new Date();
  const day = now.getDay(); // 0=Sun..6=Sat
  const diffToMonday = day===0 ? -6 : 1-day;
  const monday = new Date(now); monday.setDate(now.getDate()+diffToMonday);
  const friday = new Date(monday); friday.setDate(monday.getDate()+4);
  return {
    from: toISODate(monday),
    to: toISODate(friday),
    label: `This week (${formatDateNice(monday)} – ${formatDateNice(friday)})`
  };
}

function getRangeFor(rangeType){
  const today = todayISO();
  if(rangeType==='today'){
    return { from: today, to: today, label: `Today (${formatDateNice(new Date())})` };
  }
  if(rangeType==='week') return getWeekRange();
  if(rangeType==='month'){
    const from = new Date(); from.setDate(from.getDate()-29);
    return { from: toISODate(from), to: today, label: `Last 30 days (${formatDateNice(from)} – ${formatDateNice(new Date())})` };
  }
}

function pendingDueBadge(a){
  if(!a.dueDate) return '';
  const diff = daysBetween(todayISO(), a.dueDate);
  let cls='normal', label;
  if(diff<0){ cls='overdue'; label=`Overdue ${Math.abs(diff)}d`; }
  else if(diff===0){ cls='soon'; label='Due today'; }
  else if(diff<=3){ cls='soon'; label=diff===1?'Due tomorrow':`Due in ${diff}d`; }
  else { label=`Due in ${diff}d`; }
  return `<span class="pending-due ${cls}">${label}</span>`;
}

function moduleStepTag(a){
  if(!a.types.includes('module') || !a.moduleStep) return '';
  return ` <span class="pending-step">Step ${escapeHtml(a.moduleStep)}</span>`;
}

function computeDailyLog(from, to){
  const days = {};
  function ensure(d){ if(!days[d]) days[d] = { date: d, secs: 0, uploads: 0, completed: 0 }; return days[d]; }
  data.assignments.forEach(a=>{
    (a.timeSessions||[]).forEach(sess=>{
      if(sess.date>=from && sess.date<=to) ensure(sess.date).secs += sess.seconds;
    });
    a.uploads.forEach(d=>{ if(d>=from && d<=to) ensure(d).uploads++; });
    if(a.done && a.completedDate && a.completedDate>=from && a.completedDate<=to) ensure(a.completedDate).completed++;
  });
  return Object.values(days).sort((x,y)=>x.date.localeCompare(y.date));
}

function computeTypeBreakdown(from, to){
  return ['journal','module','dropbox','quiz'].map(type=>{
    const secs = data.assignments.filter(a=>a.types.includes(type)).reduce((s,a)=>s+getAssignmentSeconds(a, from, to), 0);
    return { type, secs };
  }).filter(t=>t.secs>0).sort((a,b)=>b.secs-a.secs);
}

function buildReportHTML(range){
  const { from, to, label } = range;
  let totalCompleted = 0, totalPending = 0;

  const dailyLog = computeDailyLog(from, to);

  const uploadsInRange = [];
  data.assignments.forEach(a=>{
    const cls = data.classes.find(c=>c.id===a.classId);
    a.uploads.forEach(d=>{
      if(d>=from && d<=to) uploadsInRange.push({ date: d, className: cls?.name||'—', assignmentName: a.name });
    });
  });
  uploadsInRange.sort((x,y)=> y.date.localeCompare(x.date));

  const classTimes = data.classes.map(cls=>{
    const secs = data.assignments.filter(a=>a.classId===cls.id).reduce((s,a)=>s+getAssignmentSeconds(a, from, to), 0);
    return { id: cls.id, name: cls.name, secs };
  }).filter(c=>c.secs>0).sort((a,b)=>b.secs-a.secs);
  const maxClassSecs = Math.max(1, ...classTimes.map(c=>c.secs));
  const totalSeconds = classTimes.reduce((s,c)=>s+c.secs, 0);

  const typeBreakdown = computeTypeBreakdown(from, to);
  const maxTypeSecs = Math.max(1, ...typeBreakdown.map(t=>t.secs));

  // Highlights: most-worked assignment, busiest day, average session length
  let topAssignment = null, topSecs = 0;
  data.assignments.forEach(a=>{
    const s = getAssignmentSeconds(a, from, to);
    if(s > topSecs){ topSecs = s; topAssignment = a; }
  });
  let sessionCount = 0, sessionSecsTotal = 0;
  data.assignments.forEach(a=>{
    (a.timeSessions||[]).forEach(sess=>{
      if(sess.date>=from && sess.date<=to){ sessionCount++; sessionSecsTotal += sess.seconds; }
    });
  });
  const avgSessionSecs = sessionCount ? sessionSecsTotal / sessionCount : 0;
  const busiestDay = dailyLog.slice().sort((a,b)=>b.secs-a.secs)[0];

  // Active days vs days in period
  const activeDateSet = new Set();
  dailyLog.forEach(d=>{ if(d.secs>0 || d.uploads>0 || d.completed>0) activeDateSet.add(d.date); });
  data.classes.forEach(c=>{ (c.workLog||[]).forEach(d=>{ if(d>=from && d<=to) activeDateSet.add(d); }); });
  const daysInPeriod = daysBetween(from, to) + 1;

  const highlightsHtml = (topAssignment && topSecs>0) || (busiestDay && busiestDay.secs>0) || sessionCount>0 ? `
    <div class="report-section">
      <h2>Highlights</h2>
      <div class="highlights-grid">
        ${topAssignment && topSecs>0 ? `
        <div class="highlight-card">
          <div class="hl-icon">🏆</div>
          <div class="hl-label">Most time spent</div>
          <div class="hl-value">${escapeHtml(topAssignment.name)}</div>
          <div class="hl-sub">${formatDuration(topSecs)} · ${escapeHtml(data.classes.find(c=>c.id===topAssignment.classId)?.name||'')}</div>
        </div>` : ''}
        ${busiestDay && busiestDay.secs>0 ? `
        <div class="highlight-card">
          <div class="hl-icon">📅</div>
          <div class="hl-label">Most active day</div>
          <div class="hl-value">${formatDateNice(new Date(busiestDay.date+'T00:00:00'))}</div>
          <div class="hl-sub">${formatDuration(busiestDay.secs)} worked</div>
        </div>` : ''}
        ${sessionCount>0 ? `
        <div class="highlight-card">
          <div class="hl-icon">⏱</div>
          <div class="hl-label">Avg. session length</div>
          <div class="hl-value">${formatDuration(avgSessionSecs)}</div>
          <div class="hl-sub">across ${sessionCount} session${sessionCount===1?'':'s'}</div>
        </div>` : ''}
      </div>
    </div>` : '';

  const subjectBars = classTimes.length ? `
    <div class="report-section">
      <h2>Time by subject</h2>
      <div class="subject-bars">
        ${classTimes.map(c=>`
          <div class="subject-bar-row">
            <span class="subject-bar-label">${escapeHtml(c.name)}</span>
            <span class="subject-bar-track"><span class="subject-bar-fill" style="width:${Math.round(c.secs/maxClassSecs*100)}%;background:${classColor(c.id)}"></span></span>
            <span class="subject-bar-time">${formatDuration(c.secs)}</span>
          </div>
        `).join('')}
      </div>
    </div>` : '';

  const typeBars = typeBreakdown.length ? `
    <div class="report-section">
      <h2>Time by type</h2>
      <div class="subject-bars">
        ${typeBreakdown.map(t=>`
          <div class="subject-bar-row">
            <span class="subject-bar-label">${t.type.charAt(0).toUpperCase()+t.type.slice(1)}</span>
            <span class="subject-bar-track"><span class="subject-bar-fill" style="width:${Math.round(t.secs/maxTypeSecs*100)}%;background:var(--${t.type})"></span></span>
            <span class="subject-bar-time">${formatDuration(t.secs)}</span>
          </div>
        `).join('')}
      </div>
    </div>` : '';

  const dailyLogSection = dailyLog.length ? `
    <div class="report-section">
      <h2>Daily activity log</h2>
      <table class="report-table">
        <thead><tr><th>Date</th><th>Time worked</th><th>Uploads</th><th>Completed</th></tr></thead>
        <tbody>
          ${dailyLog.map(d=>`
            <tr>
              <td>${formatDateNice(new Date(d.date+'T00:00:00'))}</td>
              <td>${d.secs>0 ? formatDuration(d.secs) : '—'}</td>
              <td>${d.uploads || '—'}</td>
              <td>${d.completed || '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>` : '';

  const uploadsSection = `
    <div class="report-section">
      <h2>Dropbox uploads (${uploadsInRange.length})</h2>
      ${uploadsInRange.length ? `
      <table class="report-table">
        <thead><tr><th>Date</th><th>Subject</th><th>Assignment</th></tr></thead>
        <tbody>
          ${uploadsInRange.map(u=>`<tr><td>${u.date}</td><td>${escapeHtml(u.className)}</td><td>${escapeHtml(u.assignmentName)}</td></tr>`).join('')}
        </tbody>
      </table>` : `<div class="report-empty">No uploads logged in this period.</div>`}
    </div>`;

  const scoredItems = data.assignments
    .filter(a=>a.done && a.score && a.completedDate && a.completedDate>=from && a.completedDate<=to)
    .sort((a,b)=>b.completedDate.localeCompare(a.completedDate));
  const scoresSection = scoredItems.length ? `
    <div class="report-section">
      <h2>Scores this period</h2>
      <table class="report-table">
        <thead><tr><th>Assignment</th><th>Subject</th><th>Completed</th><th>Score</th></tr></thead>
        <tbody>
          ${scoredItems.map(a=>{
            const cls = data.classes.find(c=>c.id===a.classId);
            return `<tr><td>${escapeHtml(a.name)}</td><td>${escapeHtml(cls?.name||'')}</td><td>${a.completedDate}</td><td><strong>${escapeHtml(a.score)}</strong></td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : '';

  const noWorkClasses = data.classes.filter(c=>c.noWorkAssigned);
  const noWorkSection = noWorkClasses.length ? `
    <div class="report-section">
      <h2>Classes with no work assigned</h2>
      <ul class="pending-list">
        ${noWorkClasses.map(c=>`<li><span>📭 ${escapeHtml(c.name)}</span></li>`).join('')}
      </ul>
    </div>` : '';

  const classSections = data.classes.map(cls=>{
    const classAssignments = data.assignments.filter(a=>a.classId===cls.id);
    const classCompleted = classAssignments.filter(a=>a.done && a.completedDate && a.completedDate>=from && a.completedDate<=to);
    totalCompleted += classCompleted.length;

    const workedRows = classAssignments
      .map(a=>({ a, secs: getAssignmentSeconds(a, from, to) }))
      .filter(({a,secs}) => secs>0 || (a.done && a.completedDate>=from && a.completedDate<=to))
      .sort((x,y)=>y.secs-x.secs);

    const pending = classAssignments.filter(a=>!a.done).sort((a,b)=>{
      if(a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
      if(a.dueDate) return -1;
      if(b.dueDate) return 1;
      return a.name.localeCompare(b.name);
    });
    totalPending += pending.length;

    if(workedRows.length===0 && pending.length===0) return '';

    return `
      <div class="report-section">
        <h2 style="border-bottom-color:${classColor(cls.id)}">${escapeHtml(cls.name)}</h2>
        <h3>Worked on this period</h3>
        ${workedRows.length ? `
        <table class="report-table">
          <thead><tr><th>Assignment</th><th>Type</th><th>Time</th><th>Status</th><th>Score</th></tr></thead>
          <tbody>
            ${workedRows.map(({a,secs})=>`
              <tr>
                <td>${escapeHtml(a.name)}${moduleStepTag(a)}</td>
                <td>${a.types.map(t=>`<span class="badge ${t}">${t}</span>`).join(' ')}</td>
                <td>${secs>0 ? formatDuration(secs) : '—'}</td>
                <td>${a.done && a.completedDate>=from && a.completedDate<=to ? `Completed ${a.completedDate}` : (a.done ? 'Completed earlier' : 'In progress')}</td>
                <td>${escapeHtml(a.score || '—')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>` : `<div class="report-empty">No activity logged in this class for this period.</div>`}

        <h3>Pending work (${pending.length})</h3>
        ${pending.length ? `
        <ul class="pending-list">
          ${pending.map(a=>`
            <li>
              <span>${escapeHtml(a.name)} ${a.types.map(t=>`<span class="badge ${t}">${t}</span>`).join(' ')}${moduleStepTag(a)}</span>
              ${pendingDueBadge(a)}
            </li>
          `).join('')}
        </ul>` : `<div class="report-empty">Nothing pending — all caught up in this subject.</div>`}
      </div>
    `;
  }).filter(Boolean).join('');

  return `
    <div class="report-header-bar"></div>
    <h1>📚 School Tracker Report</h1>
    <div class="report-sub">${label} · generated ${formatDateNice(new Date())}</div>
    <div class="report-summary">
      <div class="stat"><div class="num">${formatDuration(totalSeconds)}</div><div class="label">Total time worked</div></div>
      <div class="stat"><div class="num">${totalCompleted}</div><div class="label">Assignments completed</div></div>
      <div class="stat"><div class="num">${uploadsInRange.length}</div><div class="label">Dropbox uploads</div></div>
      <div class="stat"><div class="num">${totalPending}</div><div class="label">Assignments pending</div></div>
      <div class="stat"><div class="num">${activeDateSet.size}/${daysInPeriod}</div><div class="label">Active days</div></div>
    </div>
    ${highlightsHtml}
    ${subjectBars}
    ${typeBars}
    ${dailyLogSection}
    ${uploadsSection}
    ${scoresSection}
    ${noWorkSection}
    ${classSections || '<div class="report-empty">No classes to report on.</div>'}
  `;
}

function openReport(rangeType){
  const range = getRangeFor(rangeType);
  document.getElementById('reportBody').innerHTML = buildReportHTML(range);
  document.getElementById('reportOverlay').classList.add('open');
}

function closeReport(){
  document.getElementById('reportOverlay').classList.remove('open');
}

// Read-only snapshot for the browser extension (chrome.scripting world:'MAIN' calls this).
function getTrackerState(){
  return { classes: data.classes, assignments: data.assignments };
}

render();
</script>
